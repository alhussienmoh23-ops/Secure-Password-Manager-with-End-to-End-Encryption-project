<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Privacy Shield</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            width: 350px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .header h2 {
            margin: 10px 0 5px;
            font-size: 22px;
        }
        
        .header p {
            font-size: 12px;
            opacity: 0.8;
        }
        
        .stats {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .stat-card {
            flex: 1;
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            padding: 10px;
            text-align: center;
            backdrop-filter: blur(10px);
        }
        
        .stat-number {
            font-size: 28px;
            font-weight: bold;
        }
        
        .stat-label {
            font-size: 11px;
            margin-top: 5px;
            opacity: 0.8;
        }
        
        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s, opacity 0.2s;
            font-size: 12px;
        }
        
        .btn:hover {
            transform: translateY(-2px);
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .btn-primary {
            background: #4CAF50;
            color: white;
        }
        
        .btn-secondary {
            background: #f44336;
            color: white;
        }
        
        .tracker-list {
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            padding: 10px;
            margin-bottom: 15px;
            max-height: 200px;
            overflow-y: auto;
        }
        
        .tracker-list h4 {
            font-size: 12px;
            margin-bottom: 8px;
        }
        
        .tracker-item {
            font-size: 10px;
            padding: 5px;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            word-break: break-all;
        }
        
        .tracker-item:last-child {
            border-bottom: none;
        }
        
        .footer {
            font-size: 10px;
            text-align: center;
            opacity: 0.7;
        }
        
        .status-badge {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #4CAF50;
            margin-left: 5px;
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0% { opacity: 0.3; }
            50% { opacity: 1; }
            100% { opacity: 0.3; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h2>🛡️ Privacy Shield</h2>
        <p>حماية خصوصيتك على الإنترنت</p>
    </div>
    
    <div class="stats">
        <div class="stat-card">
            <div class="stat-number" id="blockedCount">0</div>
            <div class="stat-label">طلب تم حظره</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="trackerCount">0</div>
            <div class="stat-label">نوع متعقب</div>
        </div>
    </div>
    
    <div class="controls">
        <button id="analyzePage" class="btn btn-primary">🔍 تحليل سياسة الخصوصية</button>
        <button id="clearStats" class="btn btn-secondary">🗑️ مسح الإحصائيات</button>
    </div>
    
    <div class="tracker-list">
        <h4>📋 آخر المتتبعين المحظورين:</h4>
        <div id="trackerLog">لا يوجد متتبعين حتى الآن</div>
    </div>
    
    <div class="footer">
        <span id="currentSite">🌐 انتظر تحميل الموقع...</span>
        <span style="float: left;">
            <span class="status-badge"></span>
            <span style="font-size: 8px;">سيرفر</span>
        </span>
    </div>

    <script src="popup.js"></script>
</body>
</html>
